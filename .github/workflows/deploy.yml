name: deploy to cloudflare workers

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - ".agent/**"
      - ".vscode/**"
      - ".gitignore"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build with Cloudflare compatibility
        run: |
          # 把 cloudflare:workers 标记为外部模块，让构建工具忽略它
          export NODE_ENV=production
          bun run build
        env:
          # 关键：让 Vite 识别 Cloudflare 运行时模块
          VITE_CLOUDFLARE_WORKER: true

      - name: Deploy to Cloudflare Workers
        run: bun run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
